name: Claw Release

on:
    workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sandbox:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: 'openclaw/openclaw'

      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}      

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/sandbox
          labels: |
            org.opencontainers.image.commit-date={{commit_date 'YYYY-MM-DD HH:mm:ss'}}

      - name: Build and push sandbox image
        id: build-sandbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sandbox
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          push: true

      - name: Build and push sandbox image
        id: build-sandbox-common
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sandbox-common
          tags: |
            common
            common-{{date 'YYYYMMDD'}}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          push: true

      - name: Build and push sandbox image
        id: build-sandbox-browser
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sandbox-browser
          tags: |
            browser
            browser-{{date 'YYYYMMDD'}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          push: true
