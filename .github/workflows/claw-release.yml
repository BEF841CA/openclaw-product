name: Claw Release

on:
    workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sandbox:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      slim-digest: ${{ steps.build-slim.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: 'openclaw/openclaw'
      
      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}      

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: openclaw/sandbox
          tags: |
            latest
            {{date 'YYYY-MM-DD'}}
          labels: |
            org.opencontainers.image.commit-date={{commit_date 'YYYY-MM-DD HH:mm:ss'}}
      
      - name: Build and push sandbox image
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.sandbox
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          push: true

      - name: Clean up Docker build cache and unused resources
        if: always()
        run: |
            echo "🧹 清理 Docker 构建缓存和未使用资源..."
            docker system prune -a -f
