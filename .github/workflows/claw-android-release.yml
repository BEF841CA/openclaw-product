name: Claw Android Release

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_TARGET_SDK: "36"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: 'openclaw/openclaw'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: |
          cd apps/android
          chmod +x gradlew

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/android/keystore.jks

      - name: Create local.properties
        run: |
          cd apps/android
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Release APK
        env:
          OPENCLAW_ANDROID_STORE_FILE: "keystore.jks"
          OPENCLAW_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          OPENCLAW_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          OPENCLAW_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd apps/android
          ./gradlew :app:assemblePlayRelease --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" apps/android/app/build.gradle.kts | head -1 | sed 's/.*versionName = "\([^"]*\)".*/\1/')
          VERSION_CODE=$(grep "versionCode" apps/android/app/build.gradle.kts | head -1 | sed 's/.*versionCode = \([0-9]*\).*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-release-${{ steps.version.outputs.version_name }}
          path: apps/android/app/build/outputs/apk/play/release/*.apk
          retention-days: 90

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          
          gh release create "$TAG" \
            apps/android/app/build/outputs/apk/play/release/*.apk \
            --title "OpenClaw Android $VERSION_NAME" \
            --notes "## OpenClaw Android APK Release
          
**Version:** $VERSION_NAME
**Version Code:** $VERSION_CODE
**Build Date:** $(date '+%Y-%m-%d %H:%M:%S')
**Commit:** ${{ github.sha }}
**Product Flavor:** Play (Google Play compliant)

### 📱 System Requirements
- **Minimum Android:** Android 12 (API 31)
- **Target Android:** Android 14 (API 36)
- **Supported ABIs:** armeabi-v7a, arm64-v8a, x86, x86_64

### 📥 Installation
1. Download the APK file below
2. Enable \"Install from unknown sources\" in Android settings
3. Open the APK file to install
4. Grant required permissions on first launch

### ✨ What's New
- Full OpenClaw AI assistant functionality
- Google Play compliant (SMS/Call Log permissions removed)
- Optimized for performance and security

### 🔐 Security
**SHA256 Checksum:**
\`\`\`
$(sha256sum apps/android/app/build/outputs/apk/play/release/*.apk | cut -d' ' -f1)
\`\`\`

### 📋 Permissions
This build includes only essential permissions for OpenClaw functionality:
- Network access (for gateway connection)
- Camera (for camera.snap and camera.clip)
- Microphone (for camera.clip with audio)
- Location (for device discovery)
- Notifications (for status updates)

**Note:** SMS and Call Log permissions are removed for Google Play compliance."

      - name: Clean up keystore
        if: always()
        run: |
          rm -f apps/android/keystore.jks
